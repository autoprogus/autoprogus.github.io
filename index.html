<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>autoprogus</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f0f0f0;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            padding: 40px;
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }
        h1 {
            color: #333;
            font-size: 3em;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }
        .links {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .link {
            display: inline-block;
            padding: 15px 30px;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 1.2em;
            transition: background-color 0.3s, transform 0.2s;
        }
        .link:hover {
            background-color: #45a049;
            transform: scale(1.05);
        }
        /* Можно добавить разные цвета для второй ссылки, если нужно */
        .link-secondary {
            background-color: #2196F3;
        }
        .link-secondary:hover {
            background-color: #0b7dda;
        }
        @media (max-width: 500px) {
            .links {
                flex-direction: column;
                align-items: center;
                gap: 15px;
            }
            .link {
                width: 80%;
                box-sizing: border-box;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>autoprogus</h1>
        <div class="links">
            <a href="newmessage.html" class="link">Перейти на newmessage.html</a>
            <a href="knowledge.html" class="link link-secondary">Перейти на knowledge.html</a>
        </div>
    </div>
</body>
</html>
